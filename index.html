<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data World | Em Breve</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, #1e3a8a, #020617);
      color: #fff;
      overflow: hidden;
    }

    /* BACKGROUND */
    .bg-blur {
      position: absolute;
      width: 500px;
      height: 500px;
      background: #3b82f6;
      filter: blur(140px);
      opacity: 0.4;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite;
    }

    .bg-blur:nth-child(2) {
      background: #60a5fa;
      top: 60%;
      left: 60%;
      animation-delay: 3s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(60px, -60px); }
    }

    /* CARD */
    .container {
      position: relative;
      z-index: 2;
      max-width: 720px;
      width: 95%;
      padding: 160px 50px 60px; /* espaço maior no topo */
      border-radius: 24px;
      backdrop-filter: blur(25px);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      text-align: center;
      transition: transform 0.4s ease;
    }

    .container:hover {
      transform: scale(1.02);
    }

    /* LOGO GRANDE DENTRO DO CARD */
    .logo-top {
      position: absolute;
      top: 25px;
      left: 1px;

      width: 400px;
      max-width: 80%; /* impede quebrar layout */

      height: auto;
      object-fit: contain;

      opacity: 0.95;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
    }

    /* EMOJI */
    .emoji {
      font-size: 2.8rem;
      margin-bottom: 15px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 1.15rem;
      opacity: 0.85;
      margin-bottom: 18px;
    }

    .skills {
      font-size: 1rem;
      opacity: 0.75;
      margin-bottom: 35px;
      line-height: 1.6;
    }

    .line {
      width: 80px;
      height: 3px;
      margin: 25px auto;
      background: linear-gradient(90deg, transparent, #60a5fa, transparent);
      border-radius: 50px;
    }

    /* BOTÃO */
    .button {
      display: inline-block;
      padding: 14px 34px;
      border-radius: 999px;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(59,130,246,0.5);
    }

    .button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 20px 45px rgba(59,130,246,0.7);
    }

    .footer {
      margin-top: 30px;
      font-size: 0.85rem;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .container {
        padding: 180px 25px 40px;
      }

      .logo-top {
        width: 250px;
      }

      h1 {
        font-size: 2.2rem;
      }

      .skills {
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>

  <div class="bg-blur"></div>
  <div class="bg-blur"></div>

  <div class="container">

    <!-- LOGO GRANDE -->
    <img src="assets/logo.png" alt="Data World Logo" class="logo-top">

    <div class="emoji">🚧</div>

    <h1>Em construção</h1>

    <div class="line"></div>

    <p class="subtitle">
      Estou preparando algo grande por aqui.
    </p>

    <p class="skills">
      Data & Automation Analyst • Power BI • SQL • Python • APIs • n8n • Dashboards • IA aplicada
    </p>

    <a class="button" 
       href="https://www.linkedin.com/in/SEU-LINK-AQUI" 
       target="_blank">
      Fale comigo
    </a>

    <div class="footer">
      © 2026 João Victor • Data World
    </div>

  </div>

</body>
</html>
