<!DOCTYPE html>
<html lang="pt-br">
<head>
  <!-- Configurações básicas -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título da página -->
  <title>Data World | Em Breve</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    /* =========================
       RESET GLOBAL
    ========================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    /* =========================
       BODY / FUNDO PRINCIPAL
    ========================= */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, #1e3a8a, #020617);
      color: #fff;
      overflow-x: hidden;
      padding: 20px;
      position: relative;
    }

    /* =========================
       BOLHAS DE LUZ DO FUNDO
    ========================= */
    .bg-blur {
      position: absolute;
      width: min(42vw, 520px);
      height: min(42vw, 520px);
      background: #3b82f6;
      filter: blur(140px);
      opacity: 0.4;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite;
      pointer-events: none;
    }

    .bg-blur:nth-child(2) {
      background: #60a5fa;
      top: 58%;
      left: 62%;
      animation-delay: 3s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(60px, -60px); }
    }

    /* =========================
       CARD PRINCIPAL
    ========================= */
    .container {
      position: relative;
      z-index: 2;
      width: min(100%, 900px);
      min-height: 620px;
      padding: 120px 48px 56px;
      border-radius: 28px;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      text-align: center;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
      overflow: hidden;
    }

    .container:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 38px 95px rgba(0,0,0,0.55);
      border-color: rgba(255,255,255,0.18);
    }

    /* =========================
       LOGO NO TOPO ESQUERDO
    ========================= */
    .logo {
      position: absolute;
      top: 12px;
      left: 8px;
      width: clamp(220px, 30vw, 400px);
      height: auto;
      display: block;
      filter: drop-shadow(0 6px 18px rgba(0,0,0,0.28));
      user-select: none;
      pointer-events: none;
    }

    /* =========================
       ÁREA CENTRAL DE CONTEÚDO
    ========================= */
    .content {
      max-width: 760px;
      margin: 0 auto;
    }

    /* =========================
       EMOJI ANIMADO
    ========================= */
    .emoji {
      font-size: 2.7rem;
      margin-bottom: 18px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* =========================
       TÍTULO PRINCIPAL
    ========================= */
    h1 {
      font-size: clamp(2.5rem, 5vw, 5rem);
      line-height: 1.05;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: -0.04em;
    }

    /* =========================
       LINHA DE DESTAQUE
    ========================= */
    .line {
      width: 92px;
      height: 4px;
      margin: 0 auto 28px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #60a5fa, transparent);
    }

    /* =========================
       SUBTÍTULO
    ========================= */
    .subtitle {
      font-size: clamp(1.1rem, 2vw, 1.2rem);
      opacity: 0.92;
      margin-bottom: 24px;
    }

    /* =========================
       TEXTO DE HABILIDADES
    ========================= */
    .skills {
      font-size: clamp(1rem, 1.6vw, 1.05rem);
      opacity: 0.78;
      line-height: 1.7;
      margin-bottom: 38px;
    }

    /* =========================
       BOTÃO
    ========================= */
    .button {
      display: inline-block;
      padding: 16px 34px;
      border-radius: 999px;
      background: linear-gradient(135deg, #4f79ff, #6aa5ff);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 10px 30px rgba(59,130,246,0.45);
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
    }

    .button:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 18px 42px rgba(59,130,246,0.6);
      filter: brightness(1.05);
    }

    /* =========================
       RODAPÉ
    ========================= */
    .footer {
      margin-top: 30px;
      font-size: 0.85rem;
      opacity: 0.62;
    }

    /* =========================
       TABLET / TELAS MÉDIAS
    ========================= */
    @media (max-width: 900px) {
      .container {
        min-height: auto;
        padding: 128px 28px 44px;
      }

      .logo {
        width: clamp(210px, 42vw, 320px);
        top: 12px;
        left: 6px;
      }

      h1 {
        font-size: clamp(2.4rem, 7vw, 4rem);
      }
    }

    /* =========================
       MOBILE
    ========================= */
    @media (max-width: 600px) {
      body {
        padding: 14px;
      }

      .container {
        padding: 108px 20px 34px;
        border-radius: 22px;
      }

      .container:hover {
        transform: none;
      }

      .logo {
        width: clamp(180px, 52vw, 250px);
        top: 10px;
        left: 6px;
      }

      .emoji {
        font-size: 2.3rem;
        margin-bottom: 14px;
      }

      .line {
        width: 76px;
        margin-bottom: 22px;
      }

      .skills {
        margin-bottom: 30px;
      }

      .button {
        padding: 14px 28px;
      }

      .footer {
        margin-top: 24px;
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>

  <!-- Luzes do fundo -->
  <div class="bg-blur"></div>
  <div class="bg-blur"></div>

  <!-- Card principal -->
  <div class="container">

    <!-- Logo -->
    <img src="assets/logo.png" alt="Data World Logo" class="logo">

    <!-- Conteúdo central -->
    <div class="content">

      <!-- Emoji -->
      <div class="emoji">🚧</div>

      <!-- Título -->
      <h1>Em construção</h1>

      <!-- Linha -->
      <div class="line"></div>

      <!-- Subtítulo -->
      <p class="subtitle">
        Estou preparando algo grande por aqui.
      </p>

      <!-- Skills -->
      <p class="skills">
        Data & Automation Analyst • Power BI • SQL • Python • APIs • n8n • Dashboards • IA aplicada
      </p>

      <!-- Botão -->
      <a
        class="button"
        href="https://www.linkedin.com/in/SEU-LINK-AQUI"
        target="_blank"
        rel="noopener noreferrer"
      >
        Fale comigo
      </a>

      <!-- Rodapé -->
      <div class="footer">
        © 2026 João Victor • Data World
      </div>

    </div>
  </div>

</body>
</html>
