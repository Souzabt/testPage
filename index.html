<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em Breve - Portfolio</title>
  <style>
    /* Reset e fonte */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #0d47a1, #42a5f5);
      color: #fff;
      text-align: center;
      padding: 20px;
      transition: background 0.5s ease;
    }

    body:hover {
      background: linear-gradient(135deg, #1565c0, #64b5f6);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    p {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }

    .emoji {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    .button {
      display: inline-block;
      padding: 12px 25px;
      font-size: 1rem;
      color: #0d47a1;
      background-color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .button:hover {
      background-color: #e3f2fd;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.9rem;
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      p {
        font-size: 1rem;
      }
      .emoji {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div>
    <span class="emoji">🚧</span>
    <h1>Em Breve!</h1>
    <p>Esta página será o meu portfolio futuramente.</p>
    <a class="button" href="https://br.linkedin.com/in/joaovictor-dados" target="_blank" rel="noopener">Entre em contato</a>
    <div class="footer">© 2026 João Victor | Data World Brasil</div>
  </div>
</body>
</html>
