<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data World | Em Breve</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, #1e3a8a, #020617);
      color: #fff;
      overflow: hidden;
    }

    /* Background blur shapes */
    .bg-blur {
      position: absolute;
      width: 400px;
      height: 400px;
      background: #3b82f6;
      filter: blur(120px);
      opacity: 0.4;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }

    .bg-blur:nth-child(2) {
      background: #60a5fa;
      top: 60%;
      left: 60%;
      animation-delay: 3s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(40px, -40px); }
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 600px;
      width: 100%;
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      text-align: center;
    }

    .emoji {
      font-size: 2.5rem;
      margin-bottom: 10px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 1.1rem;
      opacity: 0.8;
      margin-bottom: 15px;
    }

    .skills {
      font-size: 0.95rem;
      opacity: 0.7;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px rgba(59,130,246,0.4);
    }

    .button:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 15px 35px rgba(59,130,246,0.6);
    }

    .footer {
      margin-top: 30px;
      font-size: 0.8rem;
      opacity: 0.6;
    }

    /* subtle glow line */
    .line {
      width: 60px;
      height: 3px;
      margin: 20px auto;
      background: linear-gradient(90deg, transparent, #60a5fa, transparent);
      border-radius: 50px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 2rem;
      }

      .skills {
        font-size: 0.85rem;
      }
    }

  </style>
</head>

<body>

  <div class="bg-blur"></div>
  <div class="bg-blur"></div>

  <div class="container">
    <div class="emoji">🚧</div>

    <h1>Em construção</h1>

    <div class="line"></div>

    <p class="subtitle">
      Estou preparando algo grande por aqui.
    </p>

    <p class="skills">
      Data & Automation Analyst • Power BI • SQL • Python • APIs • n8n • Dashboards • IA aplicada
    </p>

    <a class="button" href="mailto:joaovictor@email.com">
      Fale comigo
    </a>

    <div class="footer">
      © 2026 João Victor • Data World
    </div>
  </div>

</body>
</html>
