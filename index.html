<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em Breve - Portfolio</title>
  <!-- Favicon -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <style>
    /* Reset e fonte */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0d47a1, #42a5f5);
      color: #fff;
      text-align: center;
      padding: 20px;
      transition: background 0.5s ease;
    }

    body:hover {
      background: linear-gradient(135deg, #1565c0, #64b5f6);
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    p.subtitle {
      font-size: 1.2rem;
      opacity: 0.9;
      margin-bottom: 1rem;
    }

    p.skills {
      font-size: 1rem;
      opacity: 0.85;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .button {
      display: inline-block;
      padding: 12px 25px;
      font-size: 1rem;
      color: #0d47a1;
      background-color: #fff;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      margin-bottom: 2rem;
    }

    .button:hover {
      background-color: #e3f2fd;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .footer {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      p.subtitle {
        font-size: 1rem;
      }
      p.skills {
        font-size: 0.9rem;
        line-height: 1.3;
      }
      .emoji {
        font-size: 2.5rem;
      }
      .button {
        padding: 10px 20px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">🚧</span>
    <h1>Em Breve!</h1>
    <p class="subtitle">Esta página será meu portfolio futuramente.</p>
    <p class="skills">
      Data & Automation Analyst | Power BI | SQL | DAX | Python | Power Automate | Grafana | n8n | Chatbot Automatics
    </p>
    <a class="button" href="mailto:joaovictor@email.com" target="_blank" rel="noopener">
      Entre em contato
    </a>

    <div class="footer">
      © 2026 João Victor | Data World Brasil
      <!-- ícone Lucide -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           class="lucide lucide-robot" style="vertical-align: middle; margin-left: 6px;">
        <rect x="2" y="7" width="20" height="12" rx="2" ry="2"></rect>
        <path d="M6 7V5a4 4 0 0 1 8 0v2"></path>
        <path d="M8 16h.01"></path>
        <path d="M16 16h.01"></path>
        <path d="M12 11v1"></path>
        <path d="M2 15h20"></path>
      </svg>
    </div>

  </div>
</body>
</html>
