<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data World | Em Breve</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 20%, #1e3a8a, #020617);
      color: #fff;
      overflow-x: hidden;
      padding: 20px;
    }

    /* BACKGROUND */
    .bg-blur {
      position: absolute;
      width: 40vw;
      height: 40vw;
      background: #3b82f6;
      filter: blur(140px);
      opacity: 0.4;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite;
    }

    .bg-blur:nth-child(2) {
      background: #60a5fa;
      top: 60%;
      left: 60%;
      animation-delay: 3s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(60px, -60px); }
    }

    /* CARD */
    .container {
      position: relative;
      z-index: 2;
      max-width: 720px;
      width: 100%;
      padding: 120px 40px 50px;
      border-radius: 24px;
      backdrop-filter: blur(25px);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
      text-align: center;
    }

    /* LOGO COLADO NO CANTO */
    .logo {
      position: absolute;
      top: 0;
      left: 0;

      width: clamp(200px, 30vw, 400px);

      transform: translate(-10%, -20%); /* 🔥 ajuste fino visual */

      height: auto;
      pointer-events: none;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
    }

    /* EMOJI */
    .emoji {
      font-size: 2.5rem;
      margin-bottom: 15px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: clamp(1rem, 2vw, 1.15rem);
      opacity: 0.85;
      margin-bottom: 18px;
    }

    .skills {
      font-size: clamp(0.9rem, 1.8vw, 1rem);
      opacity: 0.75;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .line {
      width: 80px;
      height: 3px;
      margin: 20px auto;
      background: linear-gradient(90deg, transparent, #60a5fa, transparent);
      border-radius: 50px;
    }

    .button {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(59,130,246,0.5);
    }

    .button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 20px 45px rgba(59,130,246,0.7);
    }

    .footer {
      margin-top: 25px;
      font-size: 0.8rem;
      opacity: 0.6;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .container {
        padding: 140px 20px 40px;
      }

      .logo {
        width: 220px;
        transform: translate(-5%, -15%);
      }
    }
  </style>
</head>

<body>

  <div class="bg-blur"></div>
  <div class="bg-blur"></div>

  <div class="container">

    <!-- LOGO COLADO -->
    <img src="assets/logo.png" class="logo" alt="Data World Logo">

    <div class="emoji">🚧</div>

    <h1>Em construção</h1>

    <div class="line"></div>

    <p class="subtitle">
      Estou preparando algo grande por aqui.
    </p>

    <p class="skills">
      Data & Automation Analyst • Power BI • SQL • Python • APIs • n8n • Dashboards • IA aplicada
    </p>

    <a class="button" 
       href="https://www.linkedin.com/in/SEU-LINK-AQUI" 
       target="_blank">
      Fale comigo
    </a>

    <div class="footer">
      © 2026 João Victor • Data World
    </div>

  </div>

</body>
</html>
